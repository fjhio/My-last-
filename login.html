<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Solo mart</title>
    <style>
        :root { --bg: #ffffff; --text: #000000; --gray: #f5f5f5; --border: #e0e0e0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; }
        .auth-container { width: 100%; max-width: 400px; padding: 40px; }
        h1 { font-size: 2rem; margin-bottom: 30px; text-align: center; text-transform: uppercase; letter-spacing: 2px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border); outline: none; transition: border 0.3s; }
        input:focus { border-color: var(--text); }
        button { width: 100%; padding: 15px; background: var(--text); color: var(--bg); border: none; cursor: pointer; font-size: 1rem; text-transform: uppercase; transition: opacity 0.3s; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1>Solo mart</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" required placeholder="admin@solomart.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
    <script>
        if(localStorage.getItem('solo_auth')) window.location.href = 'index.html';
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('solo_auth', 'true');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
